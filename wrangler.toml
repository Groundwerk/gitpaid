name = "payroll-backend"
main = "backend/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = [ "nodejs_compat" ]
workers_dev = true

[vars]

# Serve the frontend SPA from the worker
[assets]
directory = "backend/public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "payroll_db"
database_id = "your-database-id-placeholder"
migrations_dir = "backend/migrations"

[dev]
port = 5001
